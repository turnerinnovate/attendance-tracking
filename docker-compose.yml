version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camptrack
    ports: ["5432:5432"]
  web:
    build: .
    env_file: .env
    depends_on: [db]
    ports: ["3000:3000"]
    command: sh -c "npx prisma migrate deploy && node prisma/seed.ts && npm run dev"
